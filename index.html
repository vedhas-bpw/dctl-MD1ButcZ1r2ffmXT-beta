<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>3D LUT Analytical DCTL Compiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0c0c0e; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #a1a1aa; -webkit-font-smoothing: antialiased; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .diagnostic-box { border-left: 2px solid #27272a; padding-left: 12px; background: rgba(24, 24, 27, 0.4); }
        .drop-zone { border: 2px dashed #27272a; transition: all 0.2s ease; }
        .drop-zone.active { border-color: #ea580c; background: rgba(234, 88, 12, 0.05); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="h-14 border-b border-zinc-800 bg-zinc-900/50 flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-2.5 h-2.5 rounded-full bg-orange-600 animate-pulse"></div>
            <h1 class="text-[11px] font-bold tracking-[0.2em] text-zinc-100 uppercase">3D LUT Mathematical Decompiler</h1>
            <div class="h-3 w-[1px] bg-zinc-800"></div>
            <span class="text-[10px] mono text-zinc-500 uppercase tracking-tighter">Float32 Solver: v1.0.0</span>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-96 border-r border-zinc-800 flex flex-col shrink-0 bg-zinc-950/50 overflow-y-auto">
            <div class="p-6 space-y-6 flex-1">
                
                <section class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Ingest 3D LUT (.cube)</label>
                    <div id="dropZone" class="drop-zone rounded-lg p-8 text-center cursor-pointer hover:border-zinc-600">
                        <svg class="w-8 h-8 mx-auto text-zinc-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                        <span class="text-[11px] text-zinc-400 block font-medium">Drag & Drop or Click to Browse</span>
                        <input type="file" id="fileInput" accept=".cube" class="hidden">
                    </div>
                </section>

                <section class="space-y-4 pt-4 border-t border-zinc-800/50">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Solver Rigor</label>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold uppercase text-zinc-500 block">Polynomial Fitting Degree</label>
                        <select id="polyDegree" class="w-full text-[11px] mono text-zinc-300 p-2 bg-zinc-900 border border-zinc-800 rounded">
                            <option value="3">3rd-Order Spline (Highly Stable)</option>
                            <option value="4">4th-Order Spline (Balanced)</option>
                            <option value="5" selected>5th-Order Spline (Maximum Precision)</option>
                        </select>
                    </div>
                </section>

                <section class="space-y-2 pt-4 border-t border-zinc-800/50 text-[10px] mono text-zinc-500 uppercase leading-relaxed">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block font-sans mb-2">Mathematical Fit Quality</label>
                    <div class="diagnostic-box p-3 space-y-2 rounded-lg">
                        <div class="flex justify-between"><span>LUT Grid Size:</span><span id="diagSize" class="text-zinc-200">-</span></div>
                        <div class="flex justify-between"><span>Matrix Residual R²:</span><span id="diagR2" class="text-zinc-200">-</span></div>
                        <div class="flex justify-between"><span>Fit Root-MSE:</span><span id="diagRMSE" class="text-orange-600">-</span></div>
                        <div class="flex justify-between"><span>Solver State:</span><span id="diagState" class="font-bold text-zinc-500">AWAITING DATA</span></div>
                    </div>
                </section>
            </div>

            <div class="p-6 border-t border-zinc-800 space-y-2 bg-zinc-900/10 shrink-0">
                <button id="copyBtn" disabled class="w-full py-2.5 rounded border border-zinc-700 hover:bg-zinc-800 text-[10px] font-bold uppercase tracking-widest text-zinc-300 disabled:opacity-30 disabled:cursor-not-allowed">Copy to Clipboard</button>
                <button id="downloadBtn" disabled class="w-full py-2.5 rounded bg-zinc-100 hover:bg-white text-zinc-950 text-[10px] font-black uppercase tracking-widest disabled:opacity-30 disabled:cursor-not-allowed">Download .dctl</button>
            </div>
        </aside>

        <section class="flex-1 flex flex-col bg-black/40 overflow-hidden">
            <div class="h-10 border-b border-zinc-800 flex items-center px-6 justify-between bg-zinc-900/30 shrink-0">
                <span id="previewFilename" class="text-[10px] mono text-zinc-500 lowercase tracking-tight">compiled_look.dctl</span>
                <span class="text-[9px] uppercase tracking-widest text-zinc-600 font-black">Headless Media Pool Architecture</span>
            </div>
            <div class="flex-1 overflow-auto p-12 lg:p-24 selection:bg-orange-600/30 leading-relaxed">
                <pre id="codeOutput" class="text-[12px] mono text-zinc-600 whitespace-pre">Awaiting .cube file execution block injection...</pre>
            </div>
        </section>
    </main>

    <script>
        /**
         * =====================================================================
         * LINEAR ALGEBRA AND POLYNOMIAL REGRESSION MATH CORE
         * =====================================================================
         */
        const MathEngine = {
            inv: (m) => {
                let n = m.length;
                let A = [];
                for(let i=0; i<n; i++) {
                    A[i] = [];
                    for(let j=0; j<n*2; j++) {
                        A[i][j] = (j < n) ? m[i][j] : (j === n + i ? 1.0 : 0.0);
                    }
                }
                for(let i=0; i<n; i++) {
                    let maxEl = Math.abs(A[i][i]), maxRow = i;
                    for(let k=i+1; k<n; k++) {
                        if(Math.abs(A[k][i]) > maxEl) { maxEl = Math.abs(A[k][i]); maxRow = k; }
                    }
                    if (maxEl < 1e-15) return null;
                    for(let k=i; k<n*2; k++) { let t = A[maxRow][k]; A[maxRow][k] = A[i][k]; A[i][k] = t; }
                    for(let k=i+1; k<n; k++) {
                        let c = -A[k][i] / A[i][i];
                        for(let j=i; j<n*2; j++) { if(i===j) { A[k][j] = 0; } else { A[k][j] += c * A[i][j]; } }
                    }
                }
                for(let i=n-1; i>=0; i--) {
                    for(let k=i-1; k>=0; k--) {
                        let c = -A[k][i] / A[i][i];
                        for(let j=i; j<n*2; j++) { A[k][j] += c * A[i][j]; }
                    }
                    let div = A[i][i];
                    for(let j=i; j<n*2; j++) { A[i][j] /= div; }
                }
                let invM = [];
                for(let i=0; i<n; i++) { invM[i] = A[i].slice(n); }
                return invM;
            },

            solveOLS: (X, Y) => {
                let cols = X[0].length;
                let XtX = Array(cols).fill(0).map(() => Array(cols).fill(0));
                let XtY = Array(cols).fill(0);
                for(let i=0; i<X.length; i++) {
                    for(let r=0; r<cols; r++) {
                        for(let c=0; c<cols; c++) { XtX[r][c] += X[i][r] * X[i][c]; }
                        XtY[r] += X[i][r] * Y[i];
                    }
                }
                let invXtX = MathEngine.inv(XtX);
                if (!invXtX) return null;
                let beta = Array(cols).fill(0);
                for(let r=0; r<cols; r++) {
                    for(let c=0; c<cols; c++) { beta[r] += invXtX[r][c] * XtY[c]; }
                }
                return beta;
            },

            fmt: (v) => { if(!Number.isFinite(v)) return "0.0f"; return v.toFixed(9) + "f"; }
        };

        const UI = {
            drop: document.getElementById('dropZone'), input: document.getElementById('fileInput'),
            degree: document.getElementById('polyDegree'), code: document.getElementById('codeOutput'),
            fn: document.getElementById('previewFilename'), copy: document.getElementById('copyBtn'),
            down: document.getElementById('downloadBtn'), size: document.getElementById('diagSize'),
            r2: document.getElementById('diagR2'), rmse: document.getElementById('diagRMSE'),
            state: document.getElementById('diagState'), val: document.getElementById('valStatus')
        };

        let parsedLutData = null;

        /**
         * =====================================================================
         * .CUBE LATTICE PARSER
         * =====================================================================
         */
        function handleFile(file) {
            if (!file) return;
            UI.state.textContent = "COMPUTING...";
            UI.state.className = "font-bold text-orange-500 animate-pulse";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                let size = 0;
                let points = [];

                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith('#') || line === '') continue;
                    if (line.startsWith('LUT_3D_SIZE')) {
                        size = parseInt(line.match(/\d+/)[0]);
                        continue;
                    }
                    if (line.startsWith('LUT_1D_SIZE')) {
                        failCompile("1D LUTs not supported. Input must be a 3D structural lattice.");
                        return;
                    }
                    const tokens = line.split(/\s+/).map(Number);
                    if (tokens.length === 3 && tokens.every(Number.isFinite)) {
                        points.push(tokens);
                    }
                }

                if (size === 0 || points.length !== size * size * size) {
                    failCompile(`Lattice structure mismatch. Extracted ${points.length} points for defined size ${size}.`);
                    return;
                }

                parsedLutData = { size: size, data: points };
                decompile();
            };
            reader.readAsText(file);
        }

        /**
         * =====================================================================
         * ANALYTICAL DECOMPOSITION ENGINE (REGRESSION TRANSFORMS)
         * =====================================================================
         */
        function decompile() {
            if (!parsedLutData) return;
            const N = parsedLutData.size;
            const points = parsedLutData.data;
            const deg = parseInt(UI.degree.value);

            let X_mat = [];
            let Y_r = [], Y_g = [], Y_b = [];

            // Reconstruct perfect geometric input grid coordinates matching the 3D lattice indices
            let idx = 0;
            for (let r = 0; r < N; r++) {
                for (let g = 0; g < N; g++) {
                    for (let b = 0; b < N; b++) {
                        let ri = r / (N - 1);
                        let gi = g / (N - 1);
                        let bi = b / (N - 1);

                        X_mat.push([ri, gi, bi]);
                        Y_r.push(points[idx][0]);
                        Y_g.push(points[idx][1]);
                        Y_b.push(points[idx][2]);
                        idx++;
                    }
                }
            }

            // Step 1: Solve OLS for the global 3x3 mixing color matrix
            let rowR = MathEngine.solveOLS(X_mat, Y_r);
            let rowG = MathEngine.solveOLS(X_mat, Y_g);
            let rowB = MathEngine.solveOLS(X_mat, Y_b);

            if (!rowR || !rowG || !rowB) {
                failCompile("Matrix singular collapse during multivariate regression solving execution.");
                return;
            }

            // Step 2: Extract post-matrix residuals to fit transfer curves using 1D Spline Regression
            let polyInR = [], polyInG = [], polyInB = [];
            for(let i=0; i<X_mat.length; i++) {
                let linR = X_mat[i][0]*rowR[0] + X_mat[i][1]*rowR[1] + X_mat[i][2]*rowR[2];
                let linG = X_mat[i][0]*rowG[0] + X_mat[i][1]*rowG[1] + X_mat[i][2]*rowG[2];
                let linB = X_mat[i][0]*rowB[0] + X_mat[i][1]*rowB[1] + X_mat[i][2]*rowB[2];

                polyInR.push(linR);
                polyInG.push(linG);
                polyInB.push(linB);
            }

            const buildPolyFeatures = (arr, d) => arr.map(v => {
                let row = [];
                for(let p=1; p<=d; p++) row.push(Math.pow(v, p));
                row.push(1.0); // Intercept constant term
                return row;
            });

            let polyFeaturesR = buildPolyFeatures(polyInR, deg);
            let polyFeaturesG = buildPolyFeatures(polyInG, deg);
            let polyFeaturesB = buildPolyFeatures(polyInB, deg);

            let coefsR = MathEngine.solveOLS(polyFeaturesR, Y_r);
            let coefsG = MathEngine.solveOLS(polyFeaturesG, Y_g);
            let coefsB = MathEngine.solveOLS(polyFeaturesB, Y_b);

            // Compute performance metrics
            let totalSqErr = 0;
            let totalVar = 0;
            let meanY = Y_r.concat(Y_g, Y_b).reduce((a,b)=>a+b, 0) / (Y_r.length * 3);
            
            for(let i=0; i<X_mat.length; i++) {
                const evaluate = (c, val, d) => {
                    let s = 0; for(let p=0; p<d; p++) { s += c[p] * Math.pow(val, d-p); }
                    return s + c[d];
                };
                let predR = evaluate(coefsR, polyInR[i], deg);
                let predG = evaluate(coefsG, polyInG[i], deg);
                let predB = evaluate(coefsB, polyInB[i], deg);

                totalSqErr += Math.pow(Y_r[i]-predR, 2) + Math.pow(Y_g[i]-predG, 2) + Math.pow(Y_b[i]-predB, 2);
                totalVar += Math.pow(Y_r[i]-meanY, 2) + Math.pow(Y_g[i]-meanY, 2) + Math.pow(Y_b[i]-meanY, 2);
            }

            let rmse = Math.sqrt(totalSqErr / (X_mat.length * 3));
            let r2 = 1.0 - (totalSqErr / totalVar);

            // Update UI statistics
            UI.size.textContent = `${N}x${N}x${N}`;
            UI.r2.textContent = r2.toFixed(5);
            UI.rmse.textContent = rmse.toExponential(4);
            UI.state.textContent = "SOLVED";
            UI.state.className = "font-bold text-emerald-500";
            UI.val.textContent = "Compilation Ready";
            UI.val.className = "px-3 py-1 rounded border border-emerald-700 bg-zinc-950 text-[9px] font-black uppercase mono text-emerald-500";
            UI.copy.disabled = UI.down.disabled = false;

            // Generate the output DCTL structure
            emitDCTL(rowR, rowG, rowB, coefsR, coefsG, coefsB, deg);
        }

        /**
         * =====================================================================
         * DCTL HEADLESS SYNTAX EXPORT GENERATOR
         * =====================================================================
         */
        function emitDCTL(rM, gM, bM, cR, cG, cB, deg) {
            let code = `// --------------------------------------------------------------------\n`;
            code += `// HEADLESS FLOATING-POINT MATHEMATICAL TRANSFORM KERNEL\n`;
            code += `// Decompiled and Optimized via Multivariate Polynomial Regression Graph\n`;
            code += `// --------------------------------------------------------------------\n\n`;
            code += `#define ACES_EPSILON 1e-10f\n#define ACES_MAX_FLOAT 65504.0f\n\n`;
            code += `#if defined(__CUDA_ARCH__)\n#define ACES_ISFINITE _isfinite\n#else\n#define ACES_ISFINITE isfinite\n#endif\n\n`;

            code += `__DEVICE__ inline float sanitize_scalar(float v) {\n`;
            code += `    if (v != v || !ACES_ISFINITE(v) || fabs(v) > ACES_MAX_FLOAT) return 0.0f;\n`;
            code += `    return v;\n}\n\n`;

            code += `__DEVICE__ inline float3 validate_finite(float3 v) {\n`;
            code += `    if (v.x != v.x || !ACES_ISFINITE(v.x) || v.y != v.y || !ACES_ISFINITE(v.y) || v.z != v.z || !ACES_ISFINITE(v.z)) {\n`;
            code += `        return make_float3(1.0f, 0.0f, 1.0f); // Secure Display-Safe Diagnostic Magenta Signal\n`;
            code += `    }\n    return make_float3(sanitize_scalar(v.x), sanitize_scalar(v.y), sanitize_scalar(v.z));\n}\n\n`;

            // Emit polynomial segment solver function
            code += `__DEVICE__ inline float evaluate_polynomial(float v, float c0, float c1, float c2, float c3, float c4, float c5, int degree) {\n`;
            code += `    if (degree == 3) return c0*_powf(v,3.0f) + c1*_powf(v,2.0f) + c2*v + c3;\n`;
            code += `    if (degree == 4) return c0*_powf(v,4.0f) + c1*_powf(v,3.0f) + c2*_powf(v,2.0f) + c3*v + c4;\n`;
            code += `    return c0*_powf(v,5.0f) + c1*_powf(v,4.0f) + c2*_powf(v,3.0f) + c3*_powf(v,2.0f) + c4*v + c5;\n}\n\n`;

            code += `__DEVICE__ float3 transform(int p_Width, int p_Height, int p_X, int p_Y, float p_R, float p_G, float p_B) {\n`;
            code += `    float3 v = make_float3(p_R, p_G, p_B);\n\n`;
            
            code += `    // STAGE 1: Multivariate 3x3 Colorspace Coordinate Matrix Transform\n`;
            code += `    float l_r = v.x * ${MathCore.fmt(rM[0])} + v.y * ${MathCore.fmt(rM[1])} + v.z * ${MathCore.fmt(rM[2])};\n`;
            code += `    float l_g = v.x * ${MathCore.fmt(gM[0])} + v.y * ${MathCore.fmt(gM[1])} + v.z * ${MathCore.fmt(gM[2])};\n`;
            code += `    float l_b = v.x * ${MathCore.fmt(bM[0])} + v.y * ${MathCore.fmt(bM[1])} + v.z * ${MathCore.fmt(bM[2])};\n`;
            code += `    v = validate_finite(make_float3(l_r, l_g, l_b));\n\n`;

            code += `    // STAGE 2: 1D Spline Curvature Tone Response Polynomial Application\n`;
            const printCoefs = (c) => {
                let pad = Array(6).fill(0.0);
                for(let i=0; i<c.length; i++) pad[i] = c[i];
                if (deg === 3) return `${MathCore.fmt(pad[0])}, ${MathCore.fmt(pad[1])}, ${MathCore.fmt(pad[2])}, ${MathCore.fmt(pad[3])}, 0.0f, 0.0f`;
                if (deg === 4) return `${MathCore.fmt(pad[0])}, ${MathCore.fmt(pad[1])}, ${MathCore.fmt(pad[2])}, ${MathCore.fmt(pad[3])}, ${MathCore.fmt(pad[4])}, 0.0f`;
                return `${MathCore.fmt(pad[0])}, ${MathCore.fmt(pad[1])}, ${MathCore.fmt(pad[2])}, ${MathCore.fmt(pad[3])}, ${MathCore.fmt(pad[4])}, ${MathCore.fmt(pad[5])}`;
            };

            code += `    float f_r = evaluate_polynomial(v.x, ${printCoefs(cR)}, ${deg});\n`;
            code += `    float f_g = evaluate_polynomial(v.y, ${printCoefs(cG)}, ${deg});\n`;
            code += `    float f_b = evaluate_polynomial(v.z, ${printCoefs(cB)}, ${deg});\n`;
            code += `    \n    return validate_finite(make_float3(f_r, f_g, f_b));\n}`;

            UI.code.textContent = code;
        }

        function failCompile(msg) {
            UI.code.textContent = `[ABORT ENGINE] Solving system halted to protect destination buffer. Reason: ${msg}`;
            UI.state.textContent = "FAILURE"; UI.state.className = "font-bold text-red-500";
            UI.val.textContent = "Execution Terminated"; UI.val.className = "px-3 py-1 rounded border border-red-700 bg-zinc-950 text-[9px] font-black uppercase mono text-red-500";
            UI.copy.disabled = UI.down.disabled = true;
            UI.size.textContent = UI.r2.textContent = UI.rmse.textContent = "-";
        }

        /**
         * =====================================================================
         * EVENT HANDLERS AND SETUP AUTOMATION
         * =====================================================================
         */
        function init() {
            UI.drop.onclick = () => UI.input.click();
            UI.input.onchange = (e) => handleFile(e.target.files[0]);
            UI.degree.onchange = () => decompile();

            UI.drop.ondragover = (e) => { e.preventDefault(); UI.drop.classList.add('active'); };
            UI.drop.ondragleave = () => UI.drop.classList.remove('active');
            UI.drop.ondrop = (e) => { e.preventDefault(); UI.drop.classList.remove('active'); handleFile(e.dataTransfer.files[0]); };

            UI.copy.onclick = () => {
                if (UI.copy.disabled) return;
                navigator.clipboard.writeText(UI.code.textContent);
                UI.copy.textContent = "COPIED KERNEL";
                setTimeout(() => UI.copy.textContent = "Copy to Clipboard", 1200);
            };

            UI.down.onclick = () => {
                if (UI.down.disabled) return;
                const blob = new Blob([UI.code.textContent], {type: "text/plain;charset=utf-8"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = UI.fn.textContent;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 150);
            };
        }

        init();
    </script>
</body>
</html>
